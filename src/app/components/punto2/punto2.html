<!-- MENÚ DE NAVEGACIÓN (Routing) -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
  <div class="container">
    <a class="navbar-brand" href="#">TPAngular</a>
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <!-- Uso de routerLink para navegación sin recargar la página -->
          <a class="nav-link" routerLink="/punto2" routerLinkActive="active">Punto 2</a>
        </li>
      </ul>
      <!-- Botón para disparar el Modal del Carrito -->
      <button class="btn btn-outline-info" data-bs-toggle="modal" data-bs-target="#modalCarrito">
        🛒 Ver Carrito ({{ carrito.length }})
      </button>
    </div>
  </div>
</nav>

<!-- GRILLA DE PRODUCTOS DESTACADOS -->
<div class="container">
  <h2 class="mb-4">Productos Destacados</h2>
  <div class="row">
    <!-- *ngFor itera sobre nuestro array de productos -->
    <div class="col-md-3 mb-4" *ngFor="let prod of productos">
      <div class="card h-100 shadow-sm">
        <!-- Property binding en el src y alt -->
        <img [src]="'/assets/img/' + prod.img" class="card-img-top" [alt]="prod.nombre" onerror="this.src='https://via.placeholder.com/150'">
        <div class="card-body d-flex flex-column">
          <!-- Pipe uppercase para el título -->
          <h5 class="card-title">{{ prod.nombre | uppercase }}</h5>
          <p class="card-text text-muted">{{ prod.descripcion }}</p>
          <!-- Pipe currency para dar formato de moneda -->
          <h4 class="card-text text-primary mt-auto">{{ prod.precio | currency:'USD' }}</h4>
          <!-- Event binding para el botón -->
          <button class="btn btn-success mt-3" (click)="agregarAlCarrito(prod)">
            Agregar al Carrito
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- MODAL DE BOOTSTRAP PARA EL CARRITO -->
<div class="modal fade" id="modalCarrito" tabindex="-1" aria-labelledby="modalCarritoLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header bg-dark text-white">
        <h5 class="modal-title" id="modalCarritoLabel">Tu Carrito de Compras</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <!-- Validamos si el carrito está vacío -->
        <p *ngIf="carrito.length === 0" class="text-center text-muted">No hay productos en tu carrito.</p>
        
        <ul class="list-group list-group-flush" *ngIf="carrito.length > 0">
          <li class="list-group-item d-flex justify-content-between align-items-center" *ngFor="let item of carrito">
            {{ item.nombre }}
            <span class="badge bg-primary rounded-pill">{{ item.precio | currency:'USD' }}</span>
          </li>
        </ul>
      </div>
      <div class="modal-footer d-flex justify-content-between">
        <h4 class="m-0">Total: <span class="text-danger">{{ totalCarrito | currency:'USD' }}</span></h4>
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
      </div>
    </div>
  </div>
</div>
