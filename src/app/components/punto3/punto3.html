<div class="container text-center mt-4">

    <h1 class="mb-4">Juego de Memoria</h1>

    <div class="mb-3">

        <button class="btn btn-success me-2"
                (click)="iniciarJuego()">
            INICIAR
        </button>

        <button class="btn btn-warning me-2"
                (click)="intentar()">
            INTENTAR
        </button>

        <button class="btn btn-danger"
                (click)="reiniciarJuego()">
            REINICIAR
        </button>

    </div>

    <h4>Intentos restantes: {{ intentos }}</h4>

    <div class="tablero mt-4">

        <div class="carta"
             *ngFor="let carta of cartas"
             (click)="seleccionarCarta(carta)">

            <div *ngIf="carta.descubierta">
                {{ carta.emoji }}
            </div>

            <div *ngIf="!carta.descubierta">
                <img src="https://cdn-icons-png.flaticon.com/512/5726/5726532.png"
                     width="60">
            </div>

        </div>

    </div>

    <div class="alert alert-success mt-4"
         *ngIf="juegoGanado()">

        ¡GANASTE EL JUEGO!

    </div>

    <div class="alert alert-danger mt-4"
         *ngIf="intentos <= 0 && !juegoGanado()">

        GAME OVER

    </div>

</div>
